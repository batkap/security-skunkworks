name: ci

on:
  push:
    branches:
      - main
      - batkap/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .
      - name: Unit tests
        run: python3 -m unittest discover -s tests
      - name: Packaging smoke
        run: security-skunkworks --help
      - name: Skill validation (Codex environments)
        run: |
          if [ -f "$HOME/.codex/skills/.system/skill-creator/scripts/quick_validate.py" ]; then
            python3 scripts/validate_skill.py --strict
          else
            echo "Skill validator unavailable on this runner; skipping"
          fi

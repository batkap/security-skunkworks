default_mode: read-only
include_paths: []
exclude_paths:
  - .git
  - node_modules
  - .venv
  - venv
  - .fvm
  - __pycache__
  - dist
  - build
compliance_frameworks:
  - owasp
  - asvs
  - cwe
primary_frameworks: []
sensitive_paths: []
docs_destination: docs/security
gate_thresholds:
  default: gated
required_scanners:
  javascript:
    - semgrep
    - gitleaks
    - npm-audit
  typescript:
    - semgrep
    - gitleaks
    - npm-audit
  dart:
    - semgrep
    - gitleaks
    - osv-scanner
  python:
    - semgrep
    - gitleaks
    - pip-audit
  containers:
    - trivy
